<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Pomodoro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Title Bar -->
  <div id="titlebar">
    <span id="titlebar-text">Pomodoro</span>
    <div id="titlebar-btns">
      <button id="btn-pin" aria-label="Toggle always on top">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" shape-rendering="crispEdges"><path d="M12 2L12 22"/><path d="M5 8L19 8"/><path d="M5 16L19 16"/></svg>
      </button>
      <button id="btn-minimize" title="Minimize to Tray" aria-label="Minimize to tray">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button id="btn-close" title="Hide to Tray" aria-label="Close to tray">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div id="container">
    <!-- Timer Ring -->
    <div id="timer-ring">
      <svg viewBox="0 0 300 300" id="progress-svg">
        <defs>
          <linearGradient id="gradient-focus" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#f97316"/>
          </linearGradient>
          <linearGradient id="gradient-break" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22c55e"/>
            <stop offset="100%" stop-color="#14b8a6"/>
          </linearGradient>
        </defs>
        <circle cx="150" cy="150" r="130" id="progress-bg" fill="none" stroke="#2d2d4a" stroke-width="8"/>
        <circle cx="150" cy="150" r="130" id="progress-fill" fill="none" stroke="url(#gradient-focus)" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="816.81" stroke-dashoffset="0"
          transform="rotate(-90 150 150)"/>
      </svg>
      <div id="timer-display">
        <span id="time-text">25:00</span>
        <span id="phase-text">Focus</span>
      </div>
    </div>

    <!-- Session Dots -->
    <div id="session-dots">
      <span class="session-dot"></span>
      <span class="session-dot"></span>
      <span class="session-dot"></span>
      <span class="session-dot"></span>
    </div>
    <span id="session-label">Round 1 / 4</span>

    <!-- Controls -->
    <div id="controls">
      <button id="btn-start" class="btn-primary">Start</button>
      <button id="btn-reset" class="btn-secondary" disabled>Reset</button>
      <button id="btn-settings" class="btn-icon" title="Settings" aria-label="Show settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button id="btn-stats" class="btn-icon" title="Statistics" aria-label="Show statistics">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>
      </button>
    </div>
  </div>

  <!-- Panel Overlay -->
  <div id="panel-overlay"></div>
  <div id="stats-panel">
    <div id="stats-header">
      <h2>Statistics</h2>
      <button id="btn-stats-close" class="btn-icon" aria-label="Close statistics">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="stats-list"></div>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel">
    <div id="settings-header">
      <h2>Settings</h2>
      <button id="btn-settings-close" class="btn-icon" aria-label="Close settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="settings-form">
      <div class="setting-row">
        <label for="setting-focus">Focus (min)</label>
        <input type="number" id="setting-focus" min="1" max="120" value="25">
      </div>
      <div class="setting-row">
        <label for="setting-short-break">Short Break (min)</label>
        <input type="number" id="setting-short-break" min="1" max="60" value="5">
      </div>
      <div class="setting-row">
        <label for="setting-long-break">Long Break (min)</label>
        <input type="number" id="setting-long-break" min="1" max="60" value="15">
      </div>
      <div class="setting-row">
        <label for="setting-sessions">Sessions before long break</label>
        <input type="number" id="setting-sessions" min="1" max="10" value="4">
      </div>
      <button id="btn-save-settings" class="btn-primary">Save</button>
    </div>
  </div>

  <audio id="audio-complete" src="" preload="auto"></audio>

  <script src="app.js"></script>
</body>
</html>
